<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001840"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#88ccff"/>
      <stop offset="100%" stop-color="#2266cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#4499ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ff88cc" stop-opacity="0"/>
    </radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="15.5" fill="none" stroke="#2244aa" stroke-width="0.5" opacity="0.5"/>
  <!-- Connection lines -->
  <g stroke="#4488ff" stroke-width="0.5" opacity="0.4" fill="none">
    <line x1="16" y1="16" x2="7" y2="9"/><line x1="16" y1="16" x2="24" y2="8"/>
    <line x1="16" y1="16" x2="26" y2="20"/><line x1="16" y1="16" x2="8" y2="23"/>
    <line x1="7" y1="9" x2="24" y2="8"/>
  </g>
  <!-- Satellite stars -->
  <g filter="url(#g)">
    <circle cx="7" cy="9" r="2.5" fill="url(#s2)" opacity="0.9"/>
    <circle cx="24" cy="8" r="2" fill="url(#s1)" opacity="0.9"/>
    <circle cx="26" cy="20" r="2.5" fill="url(#s1)" opacity="0.9"/>
    <circle cx="8" cy="23" r="2" fill="url(#s2)" opacity="0.85"/>
    <circle cx="21" cy="25" r="1.8" fill="url(#s1)" opacity="0.8"/>
  </g>
  <!-- Main glow -->
  <circle cx="16" cy="16" r="7" fill="url(#core)" opacity="0.3"/>
  <!-- Main star core -->
  <g filter="url(#g)">
    <circle cx="16" cy="16" r="4" fill="url(#core)" opacity="1"/>
  </g>
</svg>
